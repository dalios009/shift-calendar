<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0c13">
<title>Shift Calendar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0c13;--card:#111520;--card2:#161b28;--border:rgba(255,255,255,0.07);
  --sun:#FFB800;--sun-bg:rgba(255,184,0,0.13);--sun-bd:rgba(255,184,0,0.38);
  --moon:#7B9FFF;--moon-bg:rgba(123,159,255,0.13);--moon-bd:rgba(123,159,255,0.38);
  --extra:#FF5F7E;--vac:#34D399;--sick-p:#F472B6;--sick-u:#94A3B8;
  --off:rgba(255,255,255,0.04);--text:#F0F4FF;--muted:rgba(240,244,255,0.38);--dim:rgba(240,244,255,0.13);
}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);
  font-family:'Inter',-apple-system,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}

.amb{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 120% 50% at 50% -5%,rgba(123,159,255,0.09) 0%,transparent 60%),
    radial-gradient(ellipse 55% 30% at 5% 95%,rgba(255,184,0,0.05) 0%,transparent 55%),
    radial-gradient(ellipse 45% 28% at 95% 80%,rgba(255,95,126,0.04) 0%,transparent 50%);
}
.amb::after{content:'';position:absolute;inset:0;background-image:
  radial-gradient(1.5px 1.5px at 12% 18%,rgba(255,255,255,.45) 0%,transparent 100%),
  radial-gradient(1px 1px at 78% 8%,rgba(255,255,255,.30) 0%,transparent 100%),
  radial-gradient(1px 1px at 55% 30%,rgba(255,255,255,.22) 0%,transparent 100%),
  radial-gradient(2px 2px at 32% 6%,rgba(255,255,255,.55) 0%,transparent 100%),
  radial-gradient(1px 1px at 88% 38%,rgba(255,255,255,.18) 0%,transparent 100%),
  radial-gradient(1px 1px at 4% 52%,rgba(255,255,255,.28) 0%,transparent 100%),
  radial-gradient(1.5px 1.5px at 48% 12%,rgba(255,255,255,.50) 0%,transparent 100%),
  radial-gradient(1px 1px at 22% 48%,rgba(255,255,255,.18) 0%,transparent 100%),
  radial-gradient(1px 1px at 68% 55%,rgba(255,255,255,.14) 0%,transparent 100%),
  radial-gradient(1px 1px at 92% 22%,rgba(255,255,255,.24) 0%,transparent 100%);}

.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;overflow:hidden}

/* ── SETUP ── */
#setup{position:fixed;inset:0;z-index:500;background:var(--bg);
  display:flex;flex-direction:column;overflow-y:auto;padding:40px 24px 48px;
  transition:opacity .3s ease,transform .3s ease}
#setup.gone{opacity:0;transform:translateY(-30px);pointer-events:none}
.setup-logo{font-size:36px;text-align:center;margin-bottom:6px}
.setup-h{font-size:24px;font-weight:800;text-align:center;letter-spacing:-.5px;
  background:linear-gradient(135deg,#fff 30%,var(--moon) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.setup-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:32px}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);
  letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.field input,.field select{width:100%;background:var(--card2);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;color:var(--text);font-family:inherit;
  font-size:15px;font-weight:500;outline:none;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus{border-color:var(--moon-bd)}
.field select option{background:#161b28}
.setup-btn{width:100%;padding:16px;border-radius:16px;border:none;
  background:linear-gradient(135deg,#3d5afe,var(--moon));color:#fff;
  font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;
  box-shadow:0 8px 24px rgba(123,159,255,.25);transition:transform .1s,box-shadow .1s}
.setup-btn:active{transform:scale(.97)}

/* ── HEADER ── */
.hdr{padding:18px 20px 10px;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.hdr-name{font-size:22px;font-weight:800;letter-spacing:-.6px;
  background:linear-gradient(130deg,#fff 25%,var(--moon) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:3px}
.icon-btn{background:var(--card2);border:1px solid var(--border);border-radius:12px;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  font-size:15px;cursor:pointer;transition:transform .1s}
.icon-btn:active{transform:scale(.9)}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:8px 14px;flex-shrink:0}
.sb{background:var(--card);border:1px solid var(--border);border-radius:13px;
  padding:9px 4px;text-align:center;position:relative;overflow:hidden}
.sb::before{content:'';position:absolute;inset:0;opacity:.07;border-radius:inherit}
.sb.sd::before{background:var(--sun)}.sb.sn::before{background:var(--moon)}
.sb.sx::before{background:var(--extra)}.sb.sv::before{background:var(--vac)}
.sb.ss::before{background:var(--sick-p)}
.sv2{font-size:18px;font-weight:800;line-height:1}
.sl{font-size:8px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-top:2px}
.sb.sd .sv2{color:var(--sun)}.sb.sn .sv2{color:var(--moon)}
.sb.sx .sv2{color:var(--extra)}.sb.sv .sv2{color:var(--vac)}
.sb.ss .sv2{color:var(--sick-p)}.sb.so .sv2{color:var(--dim)}

/* ── MONTH NAV ── */
.mnav{display:flex;align-items:center;justify-content:space-between;padding:6px 14px 8px;flex-shrink:0}
.mnav-btn{background:var(--card2);border:1px solid var(--border);border-radius:11px;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;color:var(--muted);transition:transform .1s}
.mnav-btn:active{transform:scale(.88)}
.mnav-label{font-size:16px;font-weight:700;letter-spacing:-.3px}
.mnav-year{font-size:12px;color:var(--muted);font-weight:400;margin-left:6px}

/* ── PAGER ── */
.pager{flex:1;overflow:hidden;position:relative}
.mv{position:absolute;inset:0;padding:0 12px 12px;overflow-y:auto;
  transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .28s ease;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.mv::-webkit-scrollbar{display:none}
.mv.gone-l{transform:translateX(-105%);opacity:0;pointer-events:none}
.mv.gone-r{transform:translateX(105%);opacity:0;pointer-events:none}
.mv.here{transform:translateX(0);opacity:1}

/* ── WEEKDAY ROW ── */
.wr{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.wd{text-align:center;font-size:10px;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;color:var(--dim);padding:3px 0}
.wd.we{color:rgba(123,159,255,.28)}

/* ── CELLS ── */
.dg{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.dc{aspect-ratio:1;border-radius:13px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;position:relative;
  cursor:pointer;transition:transform .1s ease;user-select:none}
.dc:active{transform:scale(.87)}
.dc.emp{background:transparent;pointer-events:none}
.dc.off{background:var(--off)}
.dc.ds{background:linear-gradient(145deg,#1e1500,#2e2000);border:1px solid var(--sun-bd);box-shadow:0 2px 12px rgba(255,184,0,.08)}
.dc.ns{background:linear-gradient(145deg,#080d22,#0e163a);border:1px solid var(--moon-bd);box-shadow:0 2px 12px rgba(123,159,255,.08)}
.dc.vac{background:linear-gradient(145deg,#042718,#063d24);border:1px solid rgba(52,211,153,.38)}
.dc.sp{background:linear-gradient(145deg,#2a0920,#3d0d2e);border:1px solid rgba(244,114,182,.38)}
.dc.su{background:linear-gradient(145deg,#111827,#1e2535);border:1px solid rgba(148,163,184,.25)}
.dn{font-size:15px;font-weight:600;line-height:1}
.dc.off .dn,.dc.su .dn{color:var(--dim)}
.dc.ds  .dn{color:var(--sun)}
.dc.ns  .dn{color:var(--moon)}
.dc.vac .dn{color:var(--vac)}
.dc.sp  .dn{color:var(--sick-p)}
.dc.su  .dn{color:var(--sick-u)}
.di{font-size:10px;margin-top:2px;line-height:1}
.cb{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%}
.cb.cx{background:var(--extra);box-shadow:0 0 7px var(--extra)}
.cb.cv{background:var(--vac);box-shadow:0 0 6px var(--vac)}
.cb.csp{background:var(--sick-p);box-shadow:0 0 6px var(--sick-p)}
.cb.csu{background:var(--sick-u)}
.dc.tod::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;
  border-radius:50%;background:rgba(255,255,255,.55)}

/* ── OVERLAY ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s ease}
.ov.show{opacity:1;pointer-events:all}

/* ── BOTTOM SHEET ── */
.sh{position:fixed;bottom:0;left:0;right:0;background:#13192a;border-radius:24px 24px 0 0;
  border-top:1px solid rgba(255,255,255,.08);padding:16px 22px 44px;z-index:201;
  transform:translateY(110%);transition:transform .3s cubic-bezier(.34,1.1,.64,1);
  box-shadow:0 -20px 60px rgba(0,0,0,.5)}
.sh.show{transform:translateY(0)}
.sh-handle{width:36px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:0 auto 20px}
.sh-top{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.sh-ico{font-size:36px;line-height:1}
.sh-date{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px}
.sh-name{font-size:22px;font-weight:800;letter-spacing:-.4px}
.sh-name.sn{color:var(--sun)}.sh-name.mn{color:var(--moon)}
.sh-name.of{color:var(--dim)}.sh-name.vc{color:var(--vac)}
.sh-name.sk{color:var(--sick-p)}.sh-name.su2{color:var(--sick-u)}
.sh-time{font-size:13px;color:var(--muted);margin-bottom:18px}

/* ── PICK SECTION ── */
.pick-title{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.8px;
  text-transform:uppercase;margin-bottom:10px}

/* Extra sub-toggle */
.extra-toggle{display:none;gap:8px;margin-bottom:12px}
.extra-toggle.vis{display:flex}
.et-btn{flex:1;padding:10px 8px;border-radius:12px;border:1px solid var(--border);
  background:var(--card2);cursor:pointer;text-align:center;font-family:inherit;
  font-size:13px;font-weight:600;color:var(--muted);transition:all .15s ease}
.et-btn:active{transform:scale(.93)}
.et-btn.day-t.sel{background:var(--sun-bg);border-color:var(--sun-bd);color:var(--sun)}
.et-btn.ngt-t.sel{background:var(--moon-bg);border-color:var(--moon-bd);color:var(--moon)}

.pick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.pk{padding:11px 6px;border-radius:14px;border:1px solid var(--border);
  background:var(--card2);cursor:pointer;text-align:center;font-family:inherit;
  font-size:11px;font-weight:600;color:var(--muted);transition:all .15s ease;letter-spacing:.2px}
.pk:active{transform:scale(.93)}
.pk.sel{border-width:2px}
.pk.pk-x{color:var(--extra)}  .pk.pk-x.sel{background:rgba(255,95,126,.13);border-color:var(--extra)}
.pk.pk-v{color:var(--vac)}    .pk.pk-v.sel{background:rgba(52,211,153,.12);border-color:var(--vac)}
.pk.pk-sp{color:var(--sick-p)}.pk.pk-sp.sel{background:rgba(244,114,182,.12);border-color:var(--sick-p)}
.pk.pk-su{color:var(--sick-u)}.pk.pk-su.sel{background:rgba(148,163,184,.1);border-color:var(--sick-u)}
.pk.pk-cl{color:var(--dim)}   .pk.pk-cl.sel{background:rgba(255,255,255,.05);border-color:var(--dim)}

.save-btn{width:100%;padding:14px;border-radius:16px;border:none;
  background:linear-gradient(135deg,#3d5afe,var(--moon));color:#fff;
  font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;
  box-shadow:0 6px 20px rgba(123,159,255,.22);transition:transform .1s,box-shadow .1s}
.save-btn:active{transform:scale(.97)}
</style>
</head>
<body>
<div class="amb"></div>

<!-- SETUP -->
<div id="setup">
  <div class="setup-logo">🗓️</div>
  <div class="setup-h">Shift Calendar</div>
  <div class="setup-sub">Set up your personal schedule</div>
  <div class="field"><label>Your Name</label>
    <input type="text" id="inp-name" placeholder="e.g. Alex" autocomplete="off"></div>
  <div class="field"><label>First Working Day</label>
    <input type="date" id="inp-date"></div>
  <div class="field"><label>First Shift Type</label>
    <select id="inp-shift">
      <option value="day">☀️ Day (09:00 – 21:00)</option>
      <option value="night">🌙 Night (21:00 – 09:00)</option>
    </select></div>
  <div class="field"><label>Rotation Pattern</label>
    <select id="inp-rot">
      <option value="2/2">2 work / 2 off</option>
      <option value="1/3">1 work / 3 off</option>
      <option value="3/3">3 work / 3 off</option>
      <option value="2/1">2 work / 1 off</option>
    </select></div>
  <button class="setup-btn" onclick="saveSetup()">Start →</button>
</div>

<!-- MAIN -->
<div class="app" id="mainApp" style="display:none">
  <div class="hdr">
    <div>
      <div class="hdr-name" id="hdrName">My Shifts</div>
      <div class="hdr-sub"  id="hdrSub"></div>
    </div>
    <div class="icon-btn" onclick="openSettings()">⚙️</div>
  </div>
  <div class="stats" id="statsBar"></div>
  <div class="mnav">
    <div class="mnav-btn" onclick="prevMonth()">‹</div>
    <div><span class="mnav-label" id="mnavLabel"></span><span class="mnav-year" id="mnavYear"></span></div>
    <div class="mnav-btn" onclick="nextMonth()">›</div>
  </div>
  <div class="pager">
    <div class="mv here"   id="mv0"></div>
    <div class="mv gone-r" id="mv1"></div>
  </div>
</div>

<!-- OVERLAY + SHEET -->
<div class="ov" id="ov" onclick="closeSheet()"></div>
<div class="sh" id="sh">
  <div class="sh-handle"></div>
  <div class="sh-top">
    <div class="sh-ico" id="sh-ico"></div>
    <div>
      <div class="sh-date" id="sh-dt"></div>
      <div class="sh-name" id="sh-nm"></div>
    </div>
  </div>
  <div class="sh-time" id="sh-tm"></div>

  <div class="pick-title">Mark this day as</div>

  <!-- Extra day/night sub-toggle (shown only when Extra is selected) -->
  <div class="extra-toggle" id="extraToggle">
    <button class="et-btn day-t" id="et-day" onclick="setExtraType('day')">☀️ Day shift<br><small style="opacity:.6;font-size:10px">09:00–21:00</small></button>
    <button class="et-btn ngt-t" id="et-ngt" onclick="setExtraType('night')">🌙 Night shift<br><small style="opacity:.6;font-size:10px">21:00–09:00</small></button>
  </div>

  <div class="pick-grid">
    <button class="pk pk-x"  id="pk-extra"  onclick="setPick('extra')">⚡<br>Доп.смена</button>
    <button class="pk pk-v"  id="pk-vac"    onclick="setPick('vac')">🏖<br>Отпуск</button>
    <button class="pk pk-sp" id="pk-sick-p" onclick="setPick('sick-p')">💊<br>Оп.БЛ</button>
    <button class="pk pk-su" id="pk-sick-u" onclick="setPick('sick-u')">🤒<br>БЛ</button>
    <button class="pk pk-cl" id="pk-clear"  onclick="setPick('clear')">✕<br>Снять</button>
  </div>
  <button class="save-btn" onclick="savePick()">Save</button>
</div>

<script>
let cfg={}, specials={}, curY, curM, activeDate=null, pendingPick=null, pendingExtraType=null, activeSlot=0;

const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DA=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const WD=['Mo','Tu','We','Th','Fr','Sa','Su'];

function ds(y,m,d){return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
const todayS=(()=>{const t=new Date();return ds(t.getFullYear(),t.getMonth()+1,t.getDate())})();

function save(){localStorage.setItem('sc_cfg',JSON.stringify(cfg));localStorage.setItem('sc_sp',JSON.stringify(specials))}
function load(){
  try{cfg=JSON.parse(localStorage.getItem('sc_cfg'))||{}}catch(e){cfg={}}
  try{specials=JSON.parse(localStorage.getItem('sc_sp'))||{}}catch(e){specials={}}
}

function getBaseShift(s){
  if(!cfg.startDate)return 'off';
  const diff=Math.round((new Date(s+'T12:00:00')-new Date(cfg.startDate+'T12:00:00'))/86400000);
  if(diff<0)return 'off';
  const [w,o]=( cfg.rotation||'2/2').split('/').map(Number);
  const cycle=w+o, pos=((diff%cycle)+cycle)%cycle, block=Math.floor(diff/cycle);
  if(pos<w)return block%2===(cfg.firstShift==='day'?0:1)?'day':'night';
  return 'off';
}

function getDisplay(s){
  const sp=specials[s];
  return{base:getBaseShift(s),special:sp||null};
}

/* ── SETUP ── */
function saveSetup(){
  const name=document.getElementById('inp-name').value.trim()||'Employee';
  const date=document.getElementById('inp-date').value;
  if(!date){alert('Please select a start date');return}
  cfg={name,startDate:date,firstShift:document.getElementById('inp-shift').value,rotation:document.getElementById('inp-rot').value};
  save();initApp();
  document.getElementById('setup').classList.add('gone');
  setTimeout(()=>document.getElementById('setup').style.display='none',350);
}
function openSettings(){
  const s=document.getElementById('setup');
  s.style.display='flex';
  requestAnimationFrame(()=>s.classList.remove('gone'));
  document.getElementById('inp-name').value=cfg.name||'';
  document.getElementById('inp-date').value=cfg.startDate||'';
  document.getElementById('inp-shift').value=cfg.firstShift||'day';
  document.getElementById('inp-rot').value=cfg.rotation||'2/2';
}

/* ── INIT ── */
function initApp(){
  document.getElementById('mainApp').style.display='flex';
  document.getElementById('hdrName').textContent=cfg.name+"'s Shifts";
  document.getElementById('hdrSub').textContent=`${cfg.rotation||'2/2'} rotation · Day 09-21 · Night 21-09`;
  const t=new Date();curY=t.getFullYear();curM=t.getMonth()+1;
  buildAndShow(curY,curM,'none');
}

/* ── BUILD ── */
function buildCalendar(y,m){
  const first=new Date(y,m-1,1),total=new Date(y,m,0).getDate();
  let off=first.getDay()-1;if(off<0)off=6;
  let html=`<div class="wr">`;
  WD.forEach((w,i)=>html+=`<div class="wd${i>=5?' we':''}">${w}</div>`);
  html+=`</div><div class="dg">`;
  for(let i=0;i<off;i++)html+=`<div class="dc emp"></div>`;
  let sc={d:0,n:0,x:0,v:0,s:0,o:0};

  for(let d=1;d<=total;d++){
    const s=ds(y,m,d);
    const{base,special}=getDisplay(s);
    const isToday=s===todayS;
    let cl='',ico='',badgeCl='';

    if(special==='extra-day'){
      cl='ds';ico='☀️';badgeCl='cx';sc.x++;sc.d++;
    }else if(special==='extra-night'){
      cl='ns';ico='🌙';badgeCl='cx';sc.x++;sc.n++;
    }else if(special==='vac'){
      cl='vac';ico='🏖';badgeCl='cv';sc.v++;
    }else if(special==='sick-p'){
      cl='sp';ico='💊';badgeCl='csp';sc.s++;
    }else if(special==='sick-u'){
      cl='su';ico='🤒';badgeCl='csu';sc.s++;
    }else if(base==='day'){
      cl='ds';ico='☀️';sc.d++;
    }else if(base==='night'){
      cl='ns';ico='🌙';sc.n++;
    }else{
      cl='off';sc.o++;
    }

    html+=`<div class="dc ${cl}${isToday?' tod':''}" onclick="openSheet('${s}')">`
         +(badgeCl?`<div class="cb ${badgeCl}"></div>`:'')
         +`<span class="dn">${d}</span>`
         +(ico?`<span class="di">${ico}</span>`:'')
         +`</div>`;
  }
  html+=`</div>`;
  return{html,sc};
}

function buildAndShow(y,m,dir){
  const slot=activeSlot,next=1-slot;
  const{html,sc}=buildCalendar(y,m);
  const mvNext=document.getElementById(`mv${next}`);
  const mvSlot=document.getElementById(`mv${slot}`);
  mvNext.innerHTML=html;
  mvNext.classList.remove('here','gone-l','gone-r');
  mvNext.classList.add(dir==='right'?'gone-r':dir==='left'?'gone-l':'gone-r');
  requestAnimationFrame(()=>{
    if(dir!=='none'){mvSlot.classList.remove('here');mvSlot.classList.add(dir==='right'?'gone-l':'gone-r')}
    mvNext.classList.remove('gone-l','gone-r');mvNext.classList.add('here');
    if(dir==='none'){mvSlot.classList.remove('here');mvSlot.classList.add('gone-r')}
  });
  activeSlot=next;
  renderStats(sc);
  document.getElementById('mnavLabel').textContent=MN[m-1];
  document.getElementById('mnavYear').textContent=y;
}

function prevMonth(){curM--;if(curM<1){curM=12;curY--}buildAndShow(curY,curM,'left')}
function nextMonth(){curM++;if(curM>12){curM=1;curY++}buildAndShow(curY,curM,'right')}

function renderStats(sc){
  document.getElementById('statsBar').innerHTML=
    `<div class="sb sd"><div class="sv2">${sc.d}</div><div class="sl">Day</div></div>`
   +`<div class="sb sn"><div class="sv2">${sc.n}</div><div class="sl">Night</div></div>`
   +`<div class="sb sx"><div class="sv2">${sc.x}</div><div class="sl">Extra</div></div>`
   +`<div class="sb sv"><div class="sv2">${sc.v}</div><div class="sl">Отп.</div></div>`
   +`<div class="sb ss"><div class="sv2">${sc.s}</div><div class="sl">БЛ</div></div>`;
}

/* ── SHEET ── */
function openSheet(s){
  activeDate=s;
  const cur=specials[s]||null;
  pendingPick=cur?( cur==='extra-day'||cur==='extra-night'?'extra':cur):null;
  pendingExtraType=cur==='extra-day'?'day':cur==='extra-night'?'night':null;

  const d=new Date(s+'T12:00:00');
  const{base,special}=getDisplay(s);
  document.getElementById('sh-dt').textContent=`${DA[d.getDay()]}, ${MN[d.getMonth()]} ${d.getDate()} ${d.getFullYear()}`;

  let ico='',nm='',nmcl='',tm='';
  if(special==='extra-day'){ico='☀️';nm='⚡ Extra Day';nmcl='sn';tm='09:00 → 21:00 · 12 hrs'}
  else if(special==='extra-night'){ico='🌙';nm='⚡ Extra Night';nmcl='mn';tm='21:00 → 09:00 · 12 hrs'}
  else if(special==='vac'){ico='🏖';nm='Отпуск';nmcl='vc';tm='Vacation day'}
  else if(special==='sick-p'){ico='💊';nm='Оп.БЛ';nmcl='sk';tm='Paid sick leave'}
  else if(special==='sick-u'){ico='🤒';nm='БЛ';nmcl='su2';tm='Unpaid sick leave'}
  else if(base==='day'){ico='☀️';nm='Day Shift';nmcl='sn';tm='09:00 → 21:00 · 12 hrs'}
  else if(base==='night'){ico='🌙';nm='Night Shift';nmcl='mn';tm='21:00 → 09:00 · 12 hrs'}
  else{ico='💤';nm='Day Off';nmcl='of';tm='Rest day'}

  document.getElementById('sh-ico').textContent=ico;
  document.getElementById('sh-nm').textContent=nm;
  document.getElementById('sh-nm').className=`sh-name ${nmcl}`;
  document.getElementById('sh-tm').textContent=tm;

  refreshPickUI();

  document.getElementById('ov').classList.add('show');
  document.getElementById('sh').classList.add('show');
}

function refreshPickUI(){
  const keys=['extra','vac','sick-p','sick-u','clear'];
  keys.forEach(k=>{
    const el=document.getElementById(`pk-${k}`);
    const active= k==='clear'?!pendingPick : pendingPick===k;
    el.classList.toggle('sel',active);
  });

  // extra toggle visibility
  const tog=document.getElementById('extraToggle');
  if(pendingPick==='extra'){
    tog.classList.add('vis');
    document.getElementById('et-day').classList.toggle('sel',pendingExtraType==='day');
    document.getElementById('et-ngt').classList.toggle('sel',pendingExtraType==='night');
  }else{
    tog.classList.remove('vis');
  }
}

function setPick(v){
  if(v==='clear'){pendingPick=null;pendingExtraType=null;}
  else{
    pendingPick=v;
    if(v==='extra'&&!pendingExtraType){
      // default: suggest based on the base shift for that day
      const base=getBaseShift(activeDate);
      pendingExtraType=base==='night'?'night':'day';
    }else if(v!=='extra'){
      pendingExtraType=null;
    }
  }
  refreshPickUI();
}

function setExtraType(t){
  pendingExtraType=t;
  document.getElementById('et-day').classList.toggle('sel',t==='day');
  document.getElementById('et-ngt').classList.toggle('sel',t==='night');
}

function savePick(){
  if(!activeDate)return;
  if(!pendingPick){
    delete specials[activeDate];
  }else if(pendingPick==='extra'){
    if(!pendingExtraType){alert('Please choose Day or Night for the extra shift');return}
    specials[activeDate]='extra-'+pendingExtraType;
  }else{
    specials[activeDate]=pendingPick;
  }
  save();closeSheet();buildAndShow(curY,curM,'none');
}

function closeSheet(){
  document.getElementById('ov').classList.remove('show');
  document.getElementById('sh').classList.remove('show');
}

let ty=0;
const shEl=document.getElementById('sh');
shEl.addEventListener('touchstart',e=>{ty=e.touches[0].clientY},{passive:true});
shEl.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-ty>60)closeSheet()},{passive:true});

/* ── BOOT ── */
load();
if(cfg&&cfg.startDate){
  document.getElementById('setup').style.display='none';
  initApp();
}else{
  const t=new Date();
  document.getElementById('inp-date').value=ds(t.getFullYear(),t.getMonth()+1,t.getDate());
}
</script>
